services:
  - type: web
    name: operator-survey-app
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: operator-survey-db
          property: connectionString

databases:
  - name: operator-survey-db
    plan: free
