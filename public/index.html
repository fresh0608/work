<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2026Q1 产品功能设计调研</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">功能使用反馈</p>
        <h1>哪些功能好用，哪些地方需要改？</h1>
        <p>先选择你熟悉的功能，再逐个写使用感受。熟悉几个就评价几个，重点写具体场景。</p>
      </div>
    </header>

    <form id="surveyForm" novalidate>
      <section class="section profile-section">
        <div class="section-header">
          <div>
            <span class="section-step">基础信息</span>
            <h2>填写人信息</h2>
          </div>
          <p>用于按角色汇总反馈。</p>
        </div>
        <div class="section-body">
          <div class="field">
            <label for="role">你的运营角色</label>
            <input id="role" name="role" type="text" placeholder="例如：私域运营、投放运营、线索运营、撮合运营" required>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="section-header">
          <div>
            <span class="section-step">第一步</span>
            <h2>选择熟悉的功能</h2>
          </div>
          <p>不用评价所有功能，只选你实际用过或能说清楚感受的功能。</p>
        </div>
        <div class="section-body">
          <div id="featureGroups" class="stack"></div>
        </div>
      </section>

      <section class="section" id="overallSection" hidden>
        <div class="section-header">
          <div>
            <span class="section-step">最后一步</span>
            <h2>补充说明</h2>
          </div>
          <p>可选填写。写具体场景会更方便后续改进。</p>
        </div>
        <div class="section-body">
          <div class="overall-feedback-flow">
            <div class="overall-prompt">
              <div class="overall-copy">
                <label for="favoritePoints">最顺手的地方</label>
                <p>写出哪个功能或步骤帮你省时间、少漏事，或更容易判断下一步。</p>
              </div>
              <textarea id="favoritePoints" class="large-feedback" placeholder="例如：私聊分组能快速筛出需要人工跟进的客户，不用一条条翻会话。"></textarea>
            </div>
            <div class="overall-prompt">
              <div class="overall-copy">
                <label for="dislikedPoints">最不顺手的地方</label>
                <p>写出哪里卡住、难理解、容易漏看，或需要反复确认。</p>
              </div>
              <textarea id="dislikedPoints" class="large-feedback" placeholder="例如：自动分配只看到结果，看不到为什么分给这个人，所以遇到异常时不知道要不要人工处理。"></textarea>
            </div>
            <div class="overall-prompt">
              <div class="overall-copy">
                <label for="nextImprove">最希望先改的一件事</label>
                <p>只写一个最影响日常使用的点，并说明影响在哪里。</p>
              </div>
              <textarea id="nextImprove" class="large-feedback" placeholder="例如：先把动态策略组的阶段切换条件放在同一处，并明确异常时怎么处理。"></textarea>
            </div>
          </div>
        </div>
      </section>

      <div id="errors" class="error-box"></div>
      <div class="footer-actions" id="submitArea" hidden>
        <span class="status" id="formStatus">尚未提交</span>
        <button class="button primary" id="submitButton" type="submit">提交反馈</button>
      </div>
    </form>

    <section id="successView" class="success-box" hidden>
      <h2>已提交</h2>
      <p>感谢反馈，内容已记录。</p>
      <div class="top-actions">
        <button class="button primary" id="againButton" type="button">再填一份</button>
      </div>
    </section>
  </main>

  <script type="module" src="/app.js"></script>
</body>
</html>
